name: Quality Nightly

on:
  schedule:
    - cron: "25 9 * * *"
  push:
    branches:
      - "release/**"
  workflow_dispatch:

jobs:
  quality-nightly:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Dependency lock sync
        run: |
          python -m pip install --upgrade pip pip-tools
          tmp_file="$(mktemp)"
          cp requirements.txt "$tmp_file"
          python -m piptools compile \
            --resolver=backtracking \
            --strip-extras \
            --no-header \
            --no-emit-index-url \
            --no-emit-trusted-host \
            --pip-args='--platform manylinux2014_x86_64 --python-version 3.11 --implementation cp --abi cp311' \
            --output-file="$tmp_file" \
            requirements.in >/dev/null 2>&1
          diff -u "$tmp_file" requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[api,dev]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: make typecheck
      - name: Nightly Quality Gates
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LLM_PROVIDER: openai_compat
          OPENAI_MODEL_STRUCTURER: gpt-5-mini
        run: |
          set -euo pipefail
          extra_args=""
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            export PROCSUITE_ALLOW_ONLINE=1
            extra_args="--allow-online-llm"
          fi
          python ops/tools/run_quality_gates.py --tier nightly --output-dir reports/ci/nightly $extra_args
      - name: Publish Nightly Quality Summary
        if: always()
        run: |
          if [ -f reports/ci/nightly/summary.md ]; then
            cat reports/ci/nightly/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload Nightly Quality Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-nightly
          path: reports/ci/nightly
