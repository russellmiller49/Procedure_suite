name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
    inputs:
      run_supabase_tests:
        description: 'Run Supabase integration tests'
        required: false
        default: false
        type: boolean
      run_full_pytest:
        description: 'Run the full pytest suite'
        required: false
        default: false
        type: boolean

jobs:
  quality-pr:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Dependency lock sync
        run: |
          python -m pip install --upgrade pip pip-tools
          tmp_file="$(mktemp)"
          cp requirements.txt "$tmp_file"
          python -m piptools compile \
            --resolver=backtracking \
            --strip-extras \
            --no-header \
            --no-emit-index-url \
            --no-emit-trusted-host \
            --pip-args='--platform manylinux2014_x86_64 --python-version 3.11 --implementation cp --abi cp311' \
            --output-file="$tmp_file" \
            requirements.in >/dev/null 2>&1
          diff -u "$tmp_file" requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[api,dev]
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: make typecheck
      - name: PR Quality Gates
        run: |
          python ops/tools/run_quality_gates.py --tier pr --output-dir reports/ci/pr
      - name: Publish PR Quality Summary
        if: always()
        run: |
          if [ -f reports/ci/pr/summary.md ]; then
            cat reports/ci/pr/summary.md >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload PR Quality Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gates-pr
          path: reports/ci/pr

  full-pytest:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && inputs.run_full_pytest)
    needs: quality-pr
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[api,dev]
      - name: Pytest
        run: pytest -q

  supabase-integration:
    runs-on: ubuntu-latest
    # Only run when secrets are available AND either:
    # 1. Manually triggered with run_supabase_tests=true, OR
    # 2. Push to main (for validation after merge)
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.run_supabase_tests) ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository_owner == 'rjm')
    needs: quality-pr
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .[api,dev]
      - name: Check Supabase secrets
        id: check_secrets
        run: |
          if [ -n "${{ secrets.SUPABASE_URL }}" ] && [ -n "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::warning::Supabase secrets not configured - skipping integration tests"
          fi
      - name: Supabase Integration Tests
        if: steps.check_secrets.outputs.secrets_available == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RUN_SUPABASE_TESTS: "1"
        run: |
          pytest tests/integration/persistence/test_supabase_procedure_store.py -v
